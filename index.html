<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>D-Hydrate Pro</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Jura:wght@500;700&family=SF+Pro+Display:wght@400;600&display=swap');

        /* RESET & GLOBAL */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { 
            font-family: 'SF Pro Display', sans-serif; color: white; min-height: 100vh; overflow-x: hidden; 
            background: #03070d; transition: background 0.4s ease-in-out;
        }
        body::-webkit-scrollbar { display: none; }
        
        /* BACKGROUND CLASSES */
        body.bg-welcome { background: radial-gradient(circle at 50% 40%, #0d203a 0%, #03070d 80%); }
        body.bg-app { background: linear-gradient(180deg, #060e1a 0%, #020407 100%); }
        body.bg-standby { background: #000; }

        /* NAVIGATION SYSTEM */
        .page { display: none; width: 100%; min-height: 100vh; padding: 20px; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* LAYOUT FLEX UTK WELCOME & STANDBY */
        #welcome, #layar-mati { flex-direction: column; justify-content: center; align-items: center; text-align: center; }

        /* TYPOGRAPHY */
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-jura { font-family: 'Jura', sans-serif; }
        h1.title { font-size: 38px; color: #fff; text-shadow: 0 0 20px rgba(0, 229, 255, 0.6); margin-top: 15px; letter-spacing: 2px;}
        .subtitle { font-size: 11px; color: #00e5ff; letter-spacing: 5px; margin-bottom: 40px; font-weight: bold; }

        /* GLASS CARD UTAMA */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.02);
            padding: 20px; width: 100%; max-width: 450px; margin: 0 auto; position: relative;
        }

        /* STATUS BAR HEADER */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.4); border-radius: 12px; padding: 12px 18px; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; font-size: 11px; color: #8e9bb0; letter-spacing: 1px;
        }
        .status-bar .synced { color: #00ff66; display: flex; align-items: center; text-shadow: 0 0 8px rgba(0,255,102,0.5); }
        .pulse { width: 8px; height: 8px; background: #00ff66; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #00ff66; margin-right: 8px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* BUTTONS STYLING */
        .btn-glass {
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: #fff; 
            width: 100%; padding: 16px; margin-bottom: 12px; font-size: 16px; font-weight: 600; 
            display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-glass:active { transform: scale(0.98); background: rgba(255,255,255,0.12); }
        .btn-glass .icon { font-size: 24px; pointer-events: none; }
        .btn-glass .icon-right { margin-left: auto; font-size: 20px; opacity: 0.8; pointer-events: none;}

        .btn-shutdown {
            background: rgba(255, 0, 50, 0.05); border-color: rgba(255, 42, 85, 0.3); color: #ff2a55; 
            justify-content: center; margin-top: 10px; font-family: 'Orbitron', sans-serif; letter-spacing: 1px;
        }

        /* WIDGET DASHBOARD (Suhu Rata-rata & Pemanas) */
        .dashboard-widget {
            display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 15px; margin: 20px 0;
            background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .widget-kiri { display: flex; flex-direction: column; justify-content: space-between; }
        .widget-kanan { 
            background: radial-gradient(circle, rgba(0,229,255,0.1) 0%, rgba(0,0,0,0.2) 80%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 15px; border: 1px solid rgba(0,229,255,0.2); padding: 10px;
        }
        
        .mini-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 5px; }
        .mini-stat { background: rgba(255,255,255,0.05); border-radius: 6px; padding: 5px; font-size: 9px; text-align: center; font-weight: bold;}
        
        /* GRID GRAFIK (8 RAK) */
        .grid-grafik { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; margin-bottom: 20px; }
        .card-grafik {
            background: linear-gradient(180deg, rgba(20,25,35,0.8) 0%, rgba(10,15,20,0.9) 100%);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 10px;
            box-shadow: inset 0 2px 20px rgba(255,255,255,0.02); height: 130px; position: relative;
        }
        .card-grafik .header-rak { display: flex; justify-content: flex-end; font-size: 12px; margin-bottom: 5px; font-weight: bold; }
        .card-grafik .label-bawah { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 8px; color: #666; left: 0;}
        .canvas-container { height: 80px; width: 100%; }

        .watermark { text-align: center; font-size: 10px; color: #444; letter-spacing: 3px; margin-top: 20px; }
    </style>

    <script>
        // SISTEM NAVIGASI YANG SOLID
        function pindah(id) {
            document.querySelectorAll('.page').forEach(page => { page.style.display = 'none'; });

            const target = document.getElementById(id);
            if(id === 'welcome' || id === 'layar-mati') {
                target.style.display = 'flex';
            } else {
                target.style.display = 'block';
                window.scrollTo(0,0);
            }

            document.body.className = ''; 
            if(id === 'welcome') document.body.classList.add('bg-welcome');
            else if(id === 'layar-mati') document.body.classList.add('bg-standby');
            else document.body.classList.add('bg-app');

            if(id === 'menu' || id === 'grafik') jalankanSistemData();
        }
    </script>
</head>

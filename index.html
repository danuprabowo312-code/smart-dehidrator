<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dehidrator Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 1. BACKGROUND MODERN GRADIENT */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            background-attachment: fixed;
            margin: 0; 
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 2. CONTAINER HALAMAN (GLASSMORPHISM) */
        .page { 
            display: none; 
            padding: 30px 20px; 
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin: 20px 0;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active { display: block; }

        /* 3. TOMBOL KEREN */
        .btn { 
            background: rgba(255, 255, 255, 0.2);
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 15px 20px; 
            margin: 12px 0; 
            border-radius: 15px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            width: 100%;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            align-items: center;
        }

        .btn:hover {
            background: white;
            color: #1e3c72;
            transform: scale(1.03);
        }

        .btn-danger { background: rgba(220, 53, 69, 0.6); border: none; text-align: center; justify-content: center;}
        .btn-danger:hover { background: #dc3545; color: white; }

        /* 4. TATA LETAK GRAFIK */
        .grid-grafik { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
            margin-top: 20px;
        }
        
        canvas { 
            background: rgba(255, 255, 255, 0.9); 
            border-radius: 12px; 
            padding: 10px;
        }

        h1 { font-size: 28px; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        p { opacity: 0.8; font-weight: 300; }
        .number-icon { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 10px; margin-right: 15px; }
    </style>
</head>
<body>

    <div id="welcome" class="page active">
        <div style="font-size: 60px;">🌡️</div>
        <h1>Smart Dehidrator</h1>
        <p>Advanced IoT Control System</p>
        <br>
        <button class="btn btn-danger" style="margin: auto;" onclick="pindah('menu')">MULAI SEKARANG</button>
    </div>

    <div id="menu" class="page">
        <h3>Menu Panel</h3>
        <button class="btn" onclick="alert('Daging')"><span class="number-icon">1</span> Pengeringan Daging</button>
        <button class="btn" onclick="alert('Buah')"><span class="number-icon">2</span> Pengeringan Buah</button>
        <button class="btn" onclick="alert('Sayur')"><span class="number-icon">3</span> Pengeringan Sayur</button>
        <button class="btn" onclick="alert('Panduan')"><span class="number-icon">4</span> Buku Panduan</button>
        <button class="btn" onclick="pindah('grafik')"><span class="number-icon">5</span> Realtime Monitoring</button>
        <br>
        <button class="btn btn-danger" onclick="pindah('welcome')">MATIKAN SISTEM</button>
    </div>

    <div id="grafik" class="page" style="max-width: 800px;">
        <h3>Live Sensor Data</h3>
        <div class="grid-grafik">
            <canvas id="chart1"></canvas>
            <canvas id="chart2"></canvas>
            <canvas id="chart3"></canvas>
            <canvas id="chart4"></canvas>
            <canvas id="chart5"></canvas>
            <canvas id="chart6"></canvas>
            <canvas id="chart7"></canvas>
            <canvas id="chart8"></canvas>
        </div>
        <button class="btn btn-danger" onclick="pindah('menu')" style="margin-top: 20px;">KEMBALI KE MENU</button>
    </div>

    <script>
        // CONFIG FIREBASE (PASTIKAN ISI DENGAN BENAR NU!)
        const firebaseConfig = {
            apiKey: "AIzaSyBNFwuY2ikhnI6WxGtqW53qioORWLWKNT8",
            databaseURL: "smart-dehidrator-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function pindah(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        const ctxs = [1,2,3,4,5,6,7,8].map(i => document.getElementById(`chart${i}`).getContext('2d'));
        const charts = ctxs.map((ctx, i) => new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ 
                label: i==7 ? 'Thermo (°C)' : `DS18B20-${i+1} (°C)`, 
                data: [], 
                borderColor: '#1e3c72',
                backgroundColor: 'rgba(30, 60, 114, 0.1)',
                fill: true,
                tension: 0.4
            }] },
            options: { 
                scales: { y: { beginAtZero: false } },
                plugins: { legend: { display: true } }
            }
        }));

        db.ref('monitoring').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                for(let i=1; i<=8; i++) {
                    const val = data[`rak${i}`];
                    updateChart(charts[i-1], val);
                }
            }
        });

        function updateChart(chart, value) {
            const now = new Date().toLocaleTimeString();
            if(chart.data.labels.length > 7) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(value);
            chart.update();
        }
    </script>
</body>
</html>

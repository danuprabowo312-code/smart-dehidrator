<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>D-Hydrate Pro Max</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Jura:wght@500;700&family=SF+Pro+Display:wght@400;600&display=swap');

        /* RESET & GLOBAL */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { 
            font-family: 'SF Pro Display', sans-serif; color: white; 
            background-color: #030a14; overflow: hidden; /* Cegah scroll body bocor */
        }
        
        /* BACKGROUND GLOW EFEK SEPERTI DI GAMBAR */
        .bg-glow {
            position: fixed; top: -20%; left: -20%; width: 140%; height: 140%;
            background: radial-gradient(circle at 50% 30%, rgba(0, 229, 255, 0.1) 0%, rgba(3, 10, 20, 1) 60%);
            z-index: -1; pointer-events: none;
        }

        /* TUMPANG TINDIH HALAMAN (SOLUSI ANTI BLANK HITAM) */
        .page-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            overflow-y: auto; overflow-x: hidden;
            padding: 20px; padding-bottom: 50px;
            /* Rahasia Anti-Blank: Jangan pakai display none! */
            opacity: 0; visibility: hidden; z-index: 0;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .page-container.active {
            opacity: 1; visibility: visible; z-index: 10;
        }

        #welcome, #layar-mati { justify-content: center; text-align: center; }

        /* TYPOGRAPHY */
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-jura { font-family: 'Jura', sans-serif; }
        .title-glow { font-size: 32px; color: #fff; text-shadow: 0 0 15px rgba(0, 229, 255, 0.8); margin-top: 15px; letter-spacing: 2px;}

        /* STATUS BAR HEADER */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 20, 35, 0.6); border-radius: 20px; padding: 12px 20px; 
            border: 1px solid rgba(0, 229, 255, 0.2); width: 100%; max-width: 450px; margin-bottom: 20px;
            font-size: 11px; color: #8e9bb0; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .synced { color: #00ff66; display: flex; align-items: center; text-shadow: 0 0 8px rgba(0,255,102,0.5); font-weight: bold;}
        .pulse { width: 8px; height: 8px; background: #00ff66; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #00ff66; margin-right: 8px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* BUTTONS STYLING MIRIP SCREENSHOT */
        .btn-menu {
            background: linear-gradient(90deg, rgba(20,30,50,0.8) 0%, rgba(10,15,25,0.9) 100%);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: #fff; 
            width: 100%; max-width: 450px; padding: 16px 20px; margin-bottom: 12px; 
            font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 15px; 
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: 0.2s;
        }
        .btn-menu:active { transform: scale(0.97); border-color: #00e5ff; }
        .icon-box { font-size: 26px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }

        .btn-shutdown {
            background: rgba(20, 5, 10, 0.8); border: 1px solid rgba(255, 42, 85, 0.4); 
            color: #ff2a55; justify-content: center; margin-top: 15px; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 42, 85, 0.1);
        }

        /* WIDGET DASHBOARD MENU (KOMPLEKS) */
        .dashboard-panel {
            background: rgba(15, 25, 40, 0.5); border: 1px solid rgba(0,229,255,0.2);
            border-radius: 20px; padding: 15px; width: 100%; max-width: 450px;
            box-shadow: inset 0 0 30px rgba(0,100,255,0.05), 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .dash-grid-top {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;
        }

        .chart-box-main {
            background: rgba(0,0,0,0.4); border-radius: 12px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.05); position: relative; height: 160px;
        }

        .dehydrator-box {
            background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px;
            position: relative;
        }

        /* 8 RAK MINI INDICATORS */
        .mini-rak-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px;
        }
        .mini-rak {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 5px; text-align: center; font-size: 9px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 45px;
        }

        /* GRID RAK GRAFIK (8 KOTAK) DI HALAMAN GRAFIK */
        .grid-grafik-8 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 450px;}
        .card-grafik {
            background: rgba(15, 25, 40, 0.6); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 16px; padding: 12px; height: 130px; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .header-rak { text-align: center; font-size: 14px; margin-bottom: 5px; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.3);}
        .label-bawah { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 7px; color: #666; left: 0;}
        
        .canvas-container { position: relative; height: 75px; width: 100%; }
        canvas { width: 100% !important; height: 100% !important; }

        .info-text { text-align: center; font-size: 10px; color: #666; letter-spacing: 2px; margin: 15px 0;}
    </style>
</head>

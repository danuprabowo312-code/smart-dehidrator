<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Dehidrator OS V.2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-blue-dim: rgba(0, 243, 255, 0.2);
            --dark-bg: #070b14;
            --panel-bg: rgba(12, 18, 34, 0.85);
            --danger: #ff3333;
        }

        /* 1. GLOBAL STYLES (DIOPTIMALKAN UNTUK HP) */
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            color: white;
            background-color: var(--dark-bg);
            transition: background 0.5s ease;
            -webkit-tap-highlight-color: transparent; /* Hilangkan blok biru saat dipencet di HP */
        }

        body.bg-home {
            background: linear-gradient(rgba(7, 11, 20, 0.7), rgba(7, 11, 20, 0.95)), url('bg.jpg') center/cover no-repeat fixed;
        }

        body.bg-canggih {
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.1) 0%, transparent 70%),
                linear-gradient(rgba(0, 243, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            background-attachment: fixed;
        }

        /* Mode Standby / Layar Mati */
        body.bg-standby {
            background: radial-gradient(circle at center, #161e2e 0%, #050505 100%);
        }

        /* 2. CONTAINER & PANELS */
        .page { 
            display: none; 
            width: 100%;
            min-height: 100vh;
            padding: 20px 15px 70px 15px; /* Ruang bawah untuk watermark */
            box-sizing: border-box;
            animation: bootUp 0.5s ease-out forwards;
        }
        
        /* Flex center khusus untuk halaman welcome dan mati */
        #welcome, #layar-mati {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .page.active { display: block; }
        #welcome.active, #layar-mati.active { display: flex; }

        @keyframes bootUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .panel-glass {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-top: 2px solid var(--neon-blue);
            border-radius: 16px;
            padding: 25px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 15px rgba(0, 243, 255, 0.03);
            width: 100%;
            max-width: 400px; /* Ukuran pas untuk HP */
            margin: 0 auto;
        }

        /* 3. TYPOGRAPHY */
        h1, h2, h3 { 
            font-family: 'Rajdhani', sans-serif; 
            text-transform: uppercase;
            margin: 0 0 5px 0;
        }
        h1 { font-size: 28px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue-dim); letter-spacing: 1px;}
        .subtitle { font-size: 11px; color: #8892b0; letter-spacing: 2px; font-weight: 600; margin-bottom: 25px;}

        /* Status Header */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #a0aec0;
        }
        .live-dot {
            height: 6px; width: 6px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 5px #00ff00;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 4. BUTTONS / MENU ITEMS */
        .btn-menu {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 3px solid #4a5568;
            color: #e2e8f0;
            width: 100%;
            padding: 16px 15px; /* Lebih nyaman di tap */
            margin-bottom: 12px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-menu:active { transform: scale(0.98); } /* Efek pencet HP */
        
        .btn-menu .icon { margin-right: 12px; font-size: 16px; width: 20px; text-align: center;}

        .btn-primary { border-left: 3px solid var(--neon-blue); background: linear-gradient(90deg, rgba(0, 243, 255, 0.05), transparent); }
        .btn-danger { border-left: 3px solid var(--danger); margin-top: 10px;}

        /* 5. CHARTS GRID (KHUSUS HP) */
        .grid-grafik { 
            display: grid; 
            grid-template-columns: 1fr; /* 1 Kolom ke bawah buat HP */
            gap: 15px; 
            margin-top: 15px;
        }
        .chart-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px;
            height: 180px; /* Tinggi Fix biar proporsional di HP */
            position: relative;
        }

        /* 6. LAYAR STANDBY / MATI */
        .standby-icon {
            font-size: 50px;
            color: #2d3748;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .standby-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            color: #4a5568;
            letter-spacing: 3px;
        }
        .btn-reboot {
            margin-top: 40px;
            background: transparent;
            border: 1px solid #4a5568;
            color: #718096;
            padding: 8px 20px;
            border-radius: 20px;
            font-family: 'Inter';
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* 7. WATERMARK */
        .watermark { 
            position: fixed; 
            bottom: 15px; 
            width: 100%;
            text-align: center;
            font-family: 'Rajdhani', sans-serif; 
            font-size: 10px; 
            color: rgba(255,255,255,0.3); 
            letter-spacing: 2px;
            z-index: 10;
        }
        .watermark span { color: rgba(0, 243, 255, 0.5); font-weight: bold;}
    </style>
</head>

            if(id === 'welcome') document.body.className = 'bg-home';
            else document.body.className = 'bg-canggih';
            
            document.getElementById('watermark').style.display = 'block';
        }

        // FUNGSI MATIKAN SISTEM (MODE STANDBY)
        function matikanSistem() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('layar-mati').classList.add('active');
            document.body.className = 'bg-standby';
            document.getElementById('watermark').style.display = 'none';
        }

            pindah('welcome');
        }

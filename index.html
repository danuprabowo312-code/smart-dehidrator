    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Jura:wght@500;700&family=SF+Pro+Display:wght@400;600&display=swap');

        /* RESET & GLOBAL */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { 
            font-family: 'SF Pro Display', sans-serif; color: white; 
            background-color: #030a14; overflow-x: hidden; 
        }
        
        /* BACKGROUND GLOW EFEK */
        .bg-glow {
            position: fixed; top: -20%; left: -20%; width: 140%; height: 140%;
            background: radial-gradient(circle at 50% 30%, rgba(0, 229, 255, 0.1) 0%, rgba(3, 10, 20, 1) 60%);
            z-index: -10; pointer-events: none;
        }

        /* TUMPANG TINDIH HALAMAN (SOLUSI TOMBOL NYANGKUT & BLANK HITAM) */
        .page-container {
            position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh;
            padding: 20px; padding-bottom: 50px;
            
            /* KUNCI UTAMA: pointer-events: none mematikan sentuhan pada layar gaib */
            opacity: 0; pointer-events: none; z-index: -1; transform: scale(0.98);
            transition: all 0.3s ease-in-out;
            
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* Layar aktif bisa disentuh dan ada di paling depan */
        .page-container.active {
            opacity: 1; pointer-events: auto; z-index: 10; transform: scale(1);
        }

        #welcome, #layar-mati { justify-content: center; text-align: center; }

        /* TYPOGRAPHY */
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .title-glow { font-size: 32px; color: #fff; text-shadow: 0 0 15px rgba(0, 229, 255, 0.8); margin-top: 15px; letter-spacing: 2px;}

        /* STATUS BAR HEADER */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 20, 35, 0.6); border-radius: 20px; padding: 12px 20px; 
            border: 1px solid rgba(0, 229, 255, 0.2); width: 100%; max-width: 450px; margin-bottom: 20px;
            font-size: 11px; color: #8e9bb0; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .synced { color: #00ff66; display: flex; align-items: center; text-shadow: 0 0 8px rgba(0,255,102,0.5); font-weight: bold;}
        .pulse { width: 8px; height: 8px; background: #00ff66; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #00ff66; margin-right: 8px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: 0.2s;
            position: relative; overflow: hidden;
        }
